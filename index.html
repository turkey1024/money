<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>要饭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .beg-container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .reward-qr {
            width: 100%;
            height: auto;
            display: block;
            background: transparent;
        }

        .beg-tip {
            margin-top: 18px;
            font-size: 13px;
            color: #8e8e93;
            letter-spacing: 0.3px;
            font-weight: 400;
            line-height: 1.4;
        }

        a, img {
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        img {
            border: 0;
            outline: 0;
        }
    </style>
</head>
<body>
    <div class="beg-container">
        <img class="reward-qr" 
             src="https://claw-oss-01.lhl.one/20260328/5fe9deb92ad0eeeb14812a9104f7d4ba.png" 
             alt="微信赞赏码 · 随喜支持"
             loading="lazy">
        <div class="beg-tip">
            随缘给点 我要吃饭
        </div>
    </div>
</body>
  </html>
